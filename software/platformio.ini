; PlatformIO Configuration
; Target: STM32F072CBT6 – WS2812B NeoPixel + USB MSC (virtual FAT12 disk)
;
; Disk layout (4 KB RAM disk, 8 sectors):
;   color.txt  →  write a color name / R,G,B / #RRGGBB and save

[platformio]
src_dir     = Src
include_dir = Inc

[env:genericSTM32F072CB]
platform    = ststm32
board       = genericSTM32F072CB
framework   = arduino

; USBD_USE_HID_COMPOSITE gives bDeviceClass=0x00 in the device
; descriptor (correct for MSC). HID is never initialised at runtime.
build_flags =
    -DUSBCON
    -DUSBD_USE_HID_COMPOSITE
    -DHAL_PCD_MODULE_ENABLED
    -DCUSTOM_USBD_PID=0x5720

extra_scripts = pre:add_msc.py

; Connect while RESET is asserted so OpenOCD can reach the SWD port
; even when USB is active on the target.
upload_flags =
    -c
    reset_config connect_assert_srst

lib_deps = adafruit/Adafruit NeoPixel
