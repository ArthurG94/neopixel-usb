; PlatformIO Configuration
; Target: STM32F072CBT6 – WS2812B NeoPixel + USB CDC

[platformio]
src_dir     = Src
include_dir = Inc

[env:genericSTM32F072CB]
platform    = ststm32
board       = genericSTM32F072CB
framework   = arduino

build_flags =
    -DUSBCON
    -DUSBD_USE_CDC
    -DHAL_PCD_MODULE_ENABLED

lib_deps = adafruit/Adafruit NeoPixel
